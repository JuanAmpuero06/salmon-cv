name: Salmon-CV CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        if [ -f training/requirements.txt ]; then pip install -r training/requirements.txt; fi

    - name: Run Model Behavioral Tests
      run: |
        # Ejecutar los tests de comportamiento omitiendo los que requieran pesos si no están presentes
        pytest training/tests/test_behavioral.py -v
